name: Python CI Pipeline
 
on:
  push:
    branches: [main, develop]
    paths:
      - "python-validator/**"
      - ".github/workflows/py_pipeline.yaml"
  pull_request:
    branches: [main]
 
jobs:
  python-validate-test:
    name: Validator Test & Lint (${{ matrix.os }} - Py${{ matrix.python_version }})
    runs-on: ${{ matrix.os }}
 
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python_version: ["3.10", "3.11"]
 
    steps:
      # 1. Scarica il codice dal repository
      - name: Checkout code
        uses: actions/checkout@v4
 
      # 2. Configura la versione corretta di Python basata sulla matrice
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      # 3. Cache dei pacchetti pip per velocizzare le esecuzioni future
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
 
      # 4. Installa Pytest e i Linter necessari
      - name: Install dependencies
        run: |
          python -m pip install -r python-validator/requirements.txt
        shell: bash
 
      # 5. Analisi statica del codice (Linter) per mantenere pulito python-validator
      - name: Run Linters (flake8 & black)
        continue-on-error: true
        run: |
          # Controlla errori sintattici e convenzioni PEP8
          flake8 python-validator/
          # Controlla se la formattazione rispetta gli standard
          black --check python-validator/
 
      # 6. Esecuzione dei Test Unitari con Pytest (Esegue test_validate.py)
      - name: Run Python validator tests
        run: |
          cd python-validator
          pytest --verbose
 
      # 7. Test di validazione sul campo (Esegue validate.py su un JSON di test)
      # Nota: Se nel repository hai un file generato dalla pipeline C++ o un finto JSON di test (es. in data/report.json),
      # questo step verificherà che lo script validate.py ritorni codice di uscita 0 (successo).
      - name: Test Validator Script with sample JSON
        run: |
          cd python-validator
          # Controlla se esiste un file report da validare prima di lanciare il comando
          if [ -f ../data/expected_report.json ]; then
            python validate.py ../data/expected_report.json
          else
            echo "⚠️ Nessun file JSON reale trovato per un test end-to-end, salto la validazione diretta."
          fi
        shell: bash
 
      # 8. Generazione del riepilogo grafico finale su GitHub
      - name: Summary
        run: |
          echo "✅ Python Validator pipeline completed on ${{ matrix.os }} with Python ${{ matrix.python_version }}" >> $GITHUB_STEP_SUMMARY