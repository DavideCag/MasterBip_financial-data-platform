name: CI/CD C++ Module

on:
  workflow_dispatch:
  push:
    branches: [ "main", "3-github-action-cicd-pipeline" ]
    paths: ["cpp-engine/**", '.github/workflows/**']
  pull_request:
    branches: [ "main"  ]
    types: [opened, synchronize, reopened]

jobs:
  cpp-build-test:
    name: C++ Build & Test (${{ matrix.os }} - ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
 
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure and Build
      run: |
        cd cpp-engine
        mkdir build
        cd build
        cmake ..
        make
    
    - name: Run Tests 
      working-directory: build/
      run: ctest --output-on-failure